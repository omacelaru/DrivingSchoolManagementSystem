spring:
  application:
    name: payment-service
  
  datasource:
    primary:
      url: jdbc:postgresql://localhost:5432/drivingschool
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
    
    replica:
      url: jdbc:mysql://localhost:3306/drivingschool_replica
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8084

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

