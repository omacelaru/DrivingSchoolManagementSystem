spring:
  application:
    name: student-service
  profiles:
    default: local-h2
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.drivingschool: DEBUG
    org.springframework.web: INFO
    org.hibernate.tool.schema: WARN

app:
  pagination:
    default-page-size: 20
  security:
    jwt:
      secret: ${JWT_SECRET:replace-this-with-a-long-secret-key-for-local-dev-1234567890}
      issuer: api-gateway
