spring:
  application:
    name: student-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/drivingschool
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_student_service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.drivingschool: DEBUG
    org.springframework.web: INFO
    org.hibernate.tool.schema: WARN

