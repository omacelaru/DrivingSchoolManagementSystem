spring:
  application:
    name: student-service
  profiles:
    default: local-h2
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.drivingschool: DEBUG
    org.springframework.web: INFO
    org.hibernate.tool.schema: WARN
