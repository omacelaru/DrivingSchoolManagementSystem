name: Docker Build & Push

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'api-gateway/**'
      - 'student-service/**'
      - 'scheduling-service/**'
      - 'instructor-service/**'
      - 'vehicle-service/**'
      - 'payment-service/**'
      - 'notification-service/**'
      - 'common/**'
      - 'frontend/**'
      - 'pom.xml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/dsms

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            context: .
          - service: student-service
            dockerfile: student-service/Dockerfile
            context: .
          - service: scheduling-service
            dockerfile: scheduling-service/Dockerfile
            context: .
          - service: instructor-service
            dockerfile: instructor-service/Dockerfile
            context: .
          - service: vehicle-service
            dockerfile: vehicle-service/Dockerfile
            context: .
          - service: payment-service
            dockerfile: payment-service/Dockerfile
            context: .
          - service: notification-service
            dockerfile: notification-service/Dockerfile
            context: .
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  verify-build:
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()
    steps:
      - name: Verify build success
        run: |
          if [ "${{ needs.build-matrix.result }}" == "failure" ]; then
            echo "Docker build failed"
            exit 1
          fi
          echo "All Docker images built successfully"

