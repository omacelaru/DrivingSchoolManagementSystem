spring:
  application:
    name: scheduling-service
  profiles:
    default: local-h2
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: scheduling-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8082

student:
  service:
    url: ${STUDENT_SERVICE_URL:http://localhost:8081}

instructor:
  service:
    url: ${INSTRUCTOR_SERVICE_URL:http://localhost:8086}

vehicle:
  service:
    url: ${VEHICLE_SERVICE_URL:http://localhost:8083}

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8084}

lesson:
  standard-price: 100.00

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.tool.schema: WARN

app:
  pagination:
    default-page-size: 20
  security:
    jwt:
      secret: ${JWT_SECRET:replace-this-with-a-long-secret-key-for-local-dev-1234567890}
      issuer: api-gateway
