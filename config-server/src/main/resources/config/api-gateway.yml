spring:
  flyway:
    table: flyway_schema_history_api_gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - AddRequestHeader=X-Gateway-Processed, true
            - AddResponseHeader=X-Gateway-Response-Time, true
          routes:
            - id: student-service
              uri: ${STUDENT_SERVICE_ROUTE_URL:http://localhost:8081}
              predicates:
                - Path=/api/students/**
            - id: instructor-service
              uri: ${INSTRUCTOR_SERVICE_ROUTE_URL:http://localhost:8086}
              predicates:
                - Path=/api/instructors/**
            - id: scheduling-service-lessons
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:http://localhost:8082}
              predicates:
                - Path=/api/lessons/**
            - id: scheduling-service-courses
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:http://localhost:8082}
              predicates:
                - Path=/api/courses/**
            - id: vehicle-service
              uri: ${VEHICLE_SERVICE_ROUTE_URL:http://localhost:8083}
              predicates:
                - Path=/api/vehicles/**
            - id: vehicle-service-maintenances
              uri: ${VEHICLE_SERVICE_ROUTE_URL:http://localhost:8083}
              predicates:
                - Path=/api/maintenances/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_ROUTE_URL:http://localhost:8084}
              predicates:
                - Path=/api/payments/**
            - id: scheduling-resilience-demo
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:http://localhost:8082}
              predicates:
                - Path=/api/resilience-demo/payment/**, /api/resilience-demo/instructor/**
            - id: vehicle-resilience-demo
              uri: ${VEHICLE_SERVICE_ROUTE_URL:http://localhost:8083}
              predicates:
                - Path=/api/resilience-demo/scheduling/**

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO

app:
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  services:
    student-base-url: ${STUDENT_SERVICE_WEBCLIENT_URL:http://localhost:8081}
    instructor-base-url: ${INSTRUCTOR_SERVICE_WEBCLIENT_URL:http://localhost:8086}

---

spring:
  config:
    activate:
      on-profile: "local-docker | container-docker"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: student-service
              uri: ${STUDENT_SERVICE_ROUTE_URL:lb://student-service}
              predicates:
                - Path=/api/students/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: instructor-service
              uri: ${INSTRUCTOR_SERVICE_ROUTE_URL:lb://instructor-service}
              predicates:
                - Path=/api/instructors/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: scheduling-service-lessons
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:lb://scheduling-service}
              predicates:
                - Path=/api/lessons/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: scheduling-service-courses
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:lb://scheduling-service}
              predicates:
                - Path=/api/courses/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: vehicle-service
              uri: ${VEHICLE_SERVICE_ROUTE_URL:lb://vehicle-service}
              predicates:
                - Path=/api/vehicles/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: vehicle-service-maintenances
              uri: ${VEHICLE_SERVICE_ROUTE_URL:lb://vehicle-service}
              predicates:
                - Path=/api/maintenances/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: payment-service
              uri: ${PAYMENT_SERVICE_ROUTE_URL:lb://payment-service}
              predicates:
                - Path=/api/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: scheduling-resilience-demo
              uri: ${SCHEDULING_SERVICE_ROUTE_URL:lb://scheduling-service}
              predicates:
                - Path=/api/resilience-demo/payment/**, /api/resilience-demo/instructor/**
            - id: vehicle-resilience-demo
              uri: ${VEHICLE_SERVICE_ROUTE_URL:lb://vehicle-service}
              predicates:
                - Path=/api/resilience-demo/scheduling/**


STUDENT_SERVICE_ROUTE_URL: lb://student-service
INSTRUCTOR_SERVICE_ROUTE_URL: lb://instructor-service
SCHEDULING_SERVICE_ROUTE_URL: lb://scheduling-service
VEHICLE_SERVICE_ROUTE_URL: lb://vehicle-service
PAYMENT_SERVICE_ROUTE_URL: lb://payment-service

STUDENT_SERVICE_WEBCLIENT_URL: http://student-service
INSTRUCTOR_SERVICE_WEBCLIENT_URL: http://instructor-service
