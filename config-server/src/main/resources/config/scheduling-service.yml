spring:
  flyway:
    table: flyway_schema_history_scheduling_service

server:
  port: 8082

student:
  service:
    url: ${STUDENT_SERVICE_URL:http://localhost:8081}

instructor:
  service:
    url: ${INSTRUCTOR_SERVICE_URL:http://localhost:8086}

vehicle:
  service:
    url: ${VEHICLE_SERVICE_URL:http://localhost:8083}

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8084}

lesson:
  standard-price: 100.00

resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      instructorService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.FeignException
          - java.io.IOException
          - java.lang.RuntimeException
      instructorService:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.FeignException
          - java.io.IOException
          - java.lang.RuntimeException

---

spring:
  config:
    activate:
      on-profile: "local-docker | container-docker"
student:
  service:
    url: ""
instructor:
  service:
    url: ""
vehicle:
  service:
    url: ""
payment:
  service:
    url: ""
