spring:
  kafka:
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/drivingschool-notifications}

server:
  port: 8085

---
spring:
  config:
    activate:
      on-profile: container-docker
  mongodb:
    uri: mongodb://mongodb:27017/drivingschool-notifications
