include:
  - docker-compose.yml

services:
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: drivingschool-config-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  student-service:
    build:
      context: .
      dockerfile: student-service/Dockerfile
    container_name: drivingschool-student-service
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8081:8081"

  instructor-service:
    build:
      context: .
      dockerfile: instructor-service/Dockerfile
    container_name: drivingschool-instructor-service
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8086:8086"

  vehicle-service:
    build:
      context: .
      dockerfile: vehicle-service/Dockerfile
    container_name: drivingschool-vehicle-service
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8083:8083"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: drivingschool-payment-service
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8084:8084"

  scheduling-service:
    build:
      context: .
      dockerfile: scheduling-service/Dockerfile
    container_name: drivingschool-scheduling-service
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: drivingschool-notification-service
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: drivingschool-api-gateway
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      student-service:
        condition: service_started
      instructor-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: container-docker
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: replace-this-with-a-long-secret-key-for-local-dev-1234567890
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drivingschool-frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:80"
