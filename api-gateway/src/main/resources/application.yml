spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/students/**
        - id: scheduling-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/lessons/**
        - id: vehicle-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/vehicles/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      discovery:
        locator:
          enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO

