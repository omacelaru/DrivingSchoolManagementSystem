spring:
  config:
    activate:
      on-profile: local-h2
  datasource:
    url: jdbc:h2:mem:drivingschool_gateway;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

eureka:
  client:
    enabled: false

app:
  security:
    jwt:
      secret: replace-this-with-a-long-secret-key-for-local-dev-1234567890
      issuer: api-gateway
      access-token-minutes: 120
  bootstrap:
    admin:
      enabled: false
      email: ""
      password: ""
  services:
    student-base-url: http://localhost:8081
    instructor-base-url: http://localhost:8086
    scheduling-base-url: http://localhost:8082
    vehicle-base-url: http://localhost:8083
    payment-base-url: http://localhost:8084
