spring:
  config:
    activate:
      on-profile: local-docker
  datasource:
    url: jdbc:postgresql://localhost:5432/drivingschool
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
