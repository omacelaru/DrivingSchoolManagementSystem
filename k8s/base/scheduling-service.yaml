apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      containers:
        - name: scheduling-service
          image: ghcr.io/omacelaru/dsms/scheduling-service:latest
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "container-docker"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: EUREKA_SERVER_URL
              value: "http://discovery-server:8761/eureka/"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dsms-secrets
                  key: jwt-secret
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
          ports:
            - containerPort: 8082
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scheduling-service
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: scheduling-service
