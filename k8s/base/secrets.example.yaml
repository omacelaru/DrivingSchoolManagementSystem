apiVersion: v1
kind: Secret
metadata:
  name: dsms-secrets
  namespace: default
type: Opaque
stringData:
  jwt-secret: "YOUR_SECURE_JWT_SECRET_PLACEHOLDER"
  postgres-user: "YOUR_SECURE_POSTGRES_USER_PLACEHOLDER"
  postgres-password: "YOUR_SECURE_POSTGRES_PASSWORD_PLACEHOLDER"
  mongodb-uri: "YOUR_SECURE_MONGODB_URI_PLACEHOLDER"