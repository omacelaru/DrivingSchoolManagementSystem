              value: "mongodb://<cosmosdb-user>:<cosmosdb-password>@<cosmosdb-name>.mongo.cosmos.azure.com:10255/drivingschool-notifications?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000"
