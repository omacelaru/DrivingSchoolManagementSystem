spring:
  application:
    name: vehicle-service
  profiles:
    default: local-h2
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8083

scheduling:
  service:
    url: http://localhost:8082

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.tool.schema: WARN
