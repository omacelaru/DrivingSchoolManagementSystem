services:
  postgres:
    image: postgres:17-alpine
    container_name: drivingschool-postgres
    environment:
      POSTGRES_DB: drivingschool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: drivingschool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: drivingschool-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: drivingschool-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: drivingschool-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8089:8080"

  student-service:
    build:
      context: .
      dockerfile: student-service/Dockerfile
    container_name: drivingschool-student-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"

  instructor-service:
    build:
      context: .
      dockerfile: instructor-service/Dockerfile
    container_name: drivingschool-instructor-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SCHEDULING_SERVICE_URL: http://scheduling-service:8082
    ports:
      - "8086:8086"

  vehicle-service:
    build:
      context: .
      dockerfile: vehicle-service/Dockerfile
    container_name: drivingschool-vehicle-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SCHEDULING_SERVICE_URL: http://scheduling-service:8082
    ports:
      - "8083:8083"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: drivingschool-payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8084:8084"

  scheduling-service:
    build:
      context: .
      dockerfile: scheduling-service/Dockerfile
    container_name: drivingschool-scheduling-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      STUDENT_SERVICE_URL: http://student-service:8081
      INSTRUCTOR_SERVICE_URL: http://instructor-service:8086
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: drivingschool-notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: drivingschool-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      student-service:
        condition: service_started
      instructor-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local-docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drivingschool
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      STUDENT_SERVICE_URL: http://student-service:8081
      INSTRUCTOR_SERVICE_URL: http://instructor-service:8086
      SCHEDULING_SERVICE_URL: http://scheduling-service:8082
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      JWT_SECRET: replace-this-with-a-long-secret-key-for-local-dev-1234567890
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drivingschool-frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:

